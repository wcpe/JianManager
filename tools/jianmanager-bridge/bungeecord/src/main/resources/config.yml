# JianManager 插件桥配置（BungeeCord）
# 以下三项由平台签发：在 JianManager 面板对本代理实例「签发插件桥 token」后，把返回的
# wsUrl / token / instanceUuid 填入此处并重启代理。插件只与本机/同节点的 Worker 通信。

# 是否启用插件桥
enabled: true

# Worker 的插件桥 WS 地址（平台返回，形如 ws://<节点host>:<wsPort>/ws/plugin-bridge）
wsUrl: ""

# 平台签发的连接 token（scope=plugin-bridge）
token: ""

# 本实例的 UUID（平台返回）
instanceUuid: ""

# 断线重连间隔（毫秒）
reconnectDelayMillis: 5000
