# 发布管线（FR-173，见 ADR-036）。
#
# 触发：
#   - push 到 master              → 滚动预发布：覆盖固定 tag `latest`（prerelease，FR-182），说明取 CHANGELOG [Unreleased]。
#   - push tag `v*`（如 v0.11.0）  → 正式发布：建 release `vX.Y.Z`（非 prerelease），说明取该版本段。
#
# 产物：control-plane / worker × linux/amd64 + windows/amd64 共 4 个二进制 + checksums.txt，
# 命名 `<component>-<os>-<arch>[.exe]`（ADR-036 §1），sha256 校验清单（ADR-036 §2）。
#
# 内嵌：发布二进制内嵌全部可选资产——CP 内嵌前端 + 探针 jar + 客户端更新器两件套，
# Worker 内嵌 CFR 反编译器（ADR-036 §5）。go:embed 缺目录即编译失败，故 prepare-embeds 必须
# 产出所有 embed 目录内容、任一步失败即 fail-fast。
#
# 版本注入：go build -ldflags 注入 internal/version.Version（ADR-036 §4）；正式=去前缀 tag，
# 预发布=0.0.0-dev+<shortsha>。版本在 prepare-embeds 算一次、经 job output 下传，build/release 复用同值。

name: release

on:
  push:
    branches: [master]
    tags: ['v*']

permissions:
  contents: write # 发 release / 管 tag 需写权限（ADR-036 后果）

concurrency:
  # latest（master）滚动覆盖：同组取消在途，避免并发覆盖打架。tag 发布各自独立成组。
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.26'
  NODE_VERSION: '20'
  JAVA_VERSION: '21' # 探针需 JDK21；客户端更新器以 --release 8 在 JDK21 上构 Java8 字节码（无独立 toolchain 下载）

jobs:
  # ───────────────────────── prepare-embeds：一次性产出全部 go:embed 资产 ─────────────────────────
  # 内嵌资产平台无关（jar / 前端静态文件），只构建一次跨 matrix 复用。顺带算发布版本经 output 下传。
  prepare-embeds:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }} # 注入二进制的版本号
      is_release: ${{ steps.meta.outputs.is_release }} # true=tag 正式发布，false=master 滚动预发布
      release_tag: ${{ steps.meta.outputs.release_tag }} # 正式=vX.Y.Z，预发布=latest
    steps:
      - name: Checkout（含子模块，embed-probe 需 third_party/ServerProbe）
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0 # 取全历史，确保 CHANGELOG 与 tag 可读

      - name: 解析触发类型 / 版本 / 目标 tag
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/}"   # vX.Y.Z（带 v 前缀，作 tag 与注入版本）
            echo "version=${v}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
            echo "release_tag=${v}" >> "$GITHUB_OUTPUT"
          else
            v="0.0.0-dev+${GITHUB_SHA::7}" # 滚动预发布开发版（ADR-036 §4）
            echo "version=${v}" >> "$GITHUB_OUTPUT"
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            echo "release_tag=latest" >> "$GITHUB_OUTPUT"
          fi
          echo "解析得 version=${v}"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup Java（JDK21）
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: 缓存 Gradle（探针 / 客户端更新器构建）
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('client-updater/**/*.gradle*', 'third_party/ServerProbe/**/*.gradle*') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: 缓存 npm（web / bot-worker）
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('web/package-lock.json', 'bot-worker/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-

      - name: 前端依赖与构建 + 许可清单（等价 make gen-licenses + build-web + embed-web）
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix web ci
          npm --prefix bot-worker ci
          node scripts/gen-licenses.mjs
          npm --prefix web run build
          mkdir -p internal/controlplane/embed/dist
          cp -r web/dist/* internal/controlplane/embed/dist/

      - name: 内嵌探针 jar（等价 make embed-probe）
        shell: bash
        run: |
          set -euo pipefail
          (cd third_party/ServerProbe && ./gradlew --no-daemon :plugin:jar :plugin:taboolibMainTask)
          mkdir -p internal/controlplane/embed/probe
          cp third_party/ServerProbe/plugin/build/libs/ServerProbe-*.jar internal/controlplane/embed/probe/ServerProbe.jar

      - name: 内嵌客户端更新器两件套（等价 make embed-client-updater）
        shell: bash
        run: |
          set -euo pipefail
          (cd client-updater && ./gradlew --no-daemon :wedge:jar :updater-core:jar)
          mkdir -p internal/controlplane/embed/client-updater
          cp client-updater/wedge/build/libs/wedge-*.jar internal/controlplane/embed/client-updater/wedge.jar
          cp client-updater/updater-core/build/libs/updater-core-*.jar internal/controlplane/embed/client-updater/updater-core.jar

      - name: 内嵌 CFR 反编译器（等价 make embed-cfr，sha256 pin 校验）
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p internal/worker/embed/cfr
          curl -fsSL -o internal/worker/embed/cfr/cfr.jar https://repo1.maven.org/maven2/org/benf/cfr/0.152/cfr-0.152.jar
          echo "f686e8f3ded377d7bc87d216a90e9e9512df4156e75b06c655a16648ae8765b2  internal/worker/embed/cfr/cfr.jar" | sha256sum -c -

      - name: 上传 CP embed 产物（dist + probe + client-updater）
        uses: actions/upload-artifact@v4
        with:
          name: embed-controlplane
          path: internal/controlplane/embed/
          retention-days: 1
          include-hidden-files: true # 保留各目录 .gitignore 占位，避免空目录被丢弃

      - name: 上传 Worker embed 产物（cfr）
        uses: actions/upload-artifact@v4
        with:
          name: embed-worker
          path: internal/worker/embed/cfr/
          retention-days: 1
          include-hidden-files: true

  # ───────────────────────── build：交叉编译 4 个二进制（matrix） ─────────────────────────
  build:
    needs: prepare-embeds
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: linux, arch: amd64, ext: '' }
          - { os: windows, arch: amd64, ext: '.exe' }
    steps:
      - name: Checkout（不需子模块源，只需下载的 embed 产物）
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: 还原 CP embed 产物
        uses: actions/download-artifact@v4
        with:
          name: embed-controlplane
          path: internal/controlplane/embed/

      - name: 还原 Worker embed 产物
        uses: actions/download-artifact@v4
        with:
          name: embed-worker
          path: internal/worker/embed/cfr/

      - name: 交叉编译 control-plane 与 worker（ldflags 注入版本）
        shell: bash
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
          VERSION: ${{ needs.prepare-embeds.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          LDFLAGS="-s -w -X github.com/wcpe/JianManager/internal/version.Version=${VERSION}"
          go build -trimpath -ldflags "${LDFLAGS}" \
            -o "dist/control-plane-${GOOS}-${GOARCH}${{ matrix.ext }}" ./cmd/control-plane
          go build -trimpath -ldflags "${LDFLAGS}" \
            -o "dist/worker-${GOOS}-${GOARCH}${{ matrix.ext }}" ./cmd/worker
          ls -l dist/

      - name: 上传二进制产物
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          retention-days: 1

  # ───────────────────────── release：汇总 + checksums + 发布 ─────────────────────────
  release:
    needs: [prepare-embeds, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout（取 CHANGELOG + 提取脚本）
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup Node（跑 changelog-extract）
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: 下载全部二进制产物到 dist/
        uses: actions/download-artifact@v4
        with:
          pattern: binaries-*
          path: dist
          merge-multiple: true

      - name: 生成 checksums.txt（每件 sha256，ADR-036 §2）
        shell: bash
        working-directory: dist
        run: |
          set -euo pipefail
          ls -l
          sha256sum * > checksums.txt
          cat checksums.txt

      - name: 提取发布说明（CHANGELOG 段落）
        id: notes
        shell: bash
        env:
          IS_RELEASE: ${{ needs.prepare-embeds.outputs.is_release }}
          VERSION: ${{ needs.prepare-embeds.outputs.version }}
        run: |
          set -euo pipefail
          if [[ "${IS_RELEASE}" == "true" ]]; then
            node scripts/changelog-extract.mjs --version "${VERSION}" > release-notes.md
          else
            node scripts/changelog-extract.mjs --unreleased > release-notes.md
          fi
          echo "提取的发布说明："
          cat release-notes.md

      - name: 清空既有 latest 资产（仅预发布，确保只保留本次产物）
        if: needs.prepare-embeds.outputs.is_release == 'false'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # 删除既有 latest release（容忍不存在），随后由发布步骤以本次产物重建，杜绝旧资产残留（FR-182：tag 由 nightly 改名 latest）。
          gh release delete latest --cleanup-tag --yes 2>/dev/null || echo "无既有 latest release，跳过删除"

      - name: 发布正式 release（tag vX.Y.Z）
        if: needs.prepare-embeds.outputs.is_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare-embeds.outputs.release_tag }}
          name: ${{ needs.prepare-embeds.outputs.release_tag }}
          body_path: release-notes.md
          prerelease: false
          files: dist/*

      - name: 发布滚动预发布（latest）
        if: needs.prepare-embeds.outputs.is_release == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: latest
          body_path: release-notes.md
          prerelease: true
          files: dist/*
