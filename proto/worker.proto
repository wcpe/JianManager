syntax = "proto3";

package worker;

option go_package = "github.com/wcpe/JianManager/proto/workerpb";

// WorkerService 定义 Control Plane 与 Worker Node 之间的 gRPC 服务。
service WorkerService {
  // Register Worker Node 首次启动时注册到 Control Plane。
  rpc Register(RegisterRequest) returns (RegisterResponse);
  // Heartbeat 双向心跳流，Worker 上报资源指标。
  rpc Heartbeat(stream HeartbeatRequest) returns (stream HeartbeatResponse);
  // CreateInstance 在指定 Worker 上创建实例。
  rpc CreateInstance(CreateInstanceRequest) returns (CreateInstanceResponse);
  // StartInstance 启动实例。
  rpc StartInstance(InstanceActionRequest) returns (InstanceActionResponse);
  // StopInstance 停止实例。
  rpc StopInstance(InstanceActionRequest) returns (InstanceActionResponse);
  // RestartInstance 重启实例。
  rpc RestartInstance(InstanceActionRequest) returns (InstanceActionResponse);
  // KillInstance 强制终止实例。
  rpc KillInstance(InstanceActionRequest) returns (InstanceActionResponse);
  // SendCommand 向实例发送命令。
  rpc SendCommand(SendCommandRequest) returns (SendCommandResponse);
  // GetInstanceStatus 获取实例状态。
  rpc GetInstanceStatus(InstanceActionRequest) returns (GetInstanceStatusResponse);
  // ListInstances 列出 Worker 上所有实例。
  rpc ListInstances(ListInstancesRequest) returns (ListInstancesResponse);
  // StreamInstanceEvents 订阅实例事件流。
  rpc StreamInstanceEvents(StreamInstanceEventsRequest) returns (stream InstanceEvent);
  // IssueTerminalToken 签发一次性终端连接 token。
  rpc IssueTerminalToken(IssueTerminalTokenRequest) returns (IssueTerminalTokenResponse);
  // ListFiles 列出实例工作目录下的文件。
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
  // ReadFile 读取文件内容。
  rpc ReadFile(ReadFileRequest) returns (ReadFileResponse);
  // WriteFile 写入文件内容。
  rpc WriteFile(WriteFileRequest) returns (WriteFileResponse);
  // DeleteFile 删除文件。
  rpc DeleteFile(DeleteFileRequest) returns (DeleteFileResponse);
  // RenameFile 重命名文件。
  rpc RenameFile(RenameFileRequest) returns (RenameFileResponse);
  // DownloadArchive 把选中的文件/目录（目录递归）即时打包为 zip 并分块流式返回（FR-070 批量下载）。
  rpc DownloadArchive(DownloadArchiveRequest) returns (stream DownloadArchiveChunk);
  // SearchFiles 对实例工作目录做全文搜索或文件名快速打开（FR-074，见 ADR-017）。
  // Worker 维护本地持久倒排索引（var/index/，增量更新），查询返回命中文件+行+片段。
  rpc SearchFiles(SearchFilesRequest) returns (SearchFilesResponse);
  // ListArchiveEntries 列出归档（jar/zip）内全部条目（Go archive/zip，不起进程；FR-075，见 ADR-018）。
  rpc ListArchiveEntries(ListArchiveEntriesRequest) returns (ListArchiveEntriesResponse);
  // ReadArchiveEntry 读取归档内某条目内容，流式截断到上限（FR-075）。
  rpc ReadArchiveEntry(ReadArchiveEntryRequest) returns (ReadArchiveEntryResponse);
  // DecompileClass 经实例/系统 JDK 跑 CFR 反编译工作目录内 class/jar（或归档内某 class）为 Java 源码（FR-075，见 ADR-018）。
  rpc DecompileClass(DecompileClassRequest) returns (DecompileClassResponse);
  // ListConfigFiles 列出可管理配置文件。
  rpc ListConfigFiles(ListConfigFilesRequest) returns (ListConfigFilesResponse);
  // ReadConfig 读取配置文件并解析。
  rpc ReadConfig(ReadConfigRequest) returns (ReadConfigResponse);
  // WriteConfig 写入配置文件。
  rpc WriteConfig(WriteConfigRequest) returns (WriteConfigResponse);
  // ValidateConfig 校验配置内容。
  rpc ValidateConfig(ValidateConfigRequest) returns (ValidateConfigResponse);
  // GetNodeMetrics 获取节点指标。
  rpc GetNodeMetrics(GetNodeMetricsRequest) returns (GetNodeMetricsResponse);
  // GetInstanceMetrics 获取实例指标。
  rpc GetInstanceMetrics(GetInstanceMetricsRequest) returns (GetInstanceMetricsResponse);

  // === JDK 管理 ===

  // ListJDKs 列出 Worker 本地已注册/探测到的 JDK 目录。
  rpc ListJDKs(ListJDKsRequest) returns (ListJDKsResponse);
  // InstallJDK 下载并安装指定 JDK 到 Worker 托管目录。
  rpc InstallJDK(InstallJDKRequest) returns (InstallJDKResponse);
  // RemoveJDK 删除 Worker 托管的 JDK 目录。
  rpc RemoveJDK(RemoveJDKRequest) returns (RemoveJDKResponse);
  // DownloadCore 下载服务端核心 jar 到实例工作目录（FR-034 一键开服）。
  rpc DownloadCore(DownloadCoreRequest) returns (DownloadCoreResponse);
  // DeployServerProbe 部署 ServerProbe 监控探针 jar 与 config 到实例 plugins 目录（FR-010）。
  rpc DeployServerProbe(DeployServerProbeRequest) returns (DeployServerProbeResponse);
  // CloneWorkDir 复制源实例工作目录到目标实例工作目录，排除运行态文件（FR-036 一键复制）。
  rpc CloneWorkDir(CloneWorkDirRequest) returns (CloneWorkDirResponse);

  // === Docker 镜像管理（FR-078，见 ADR-019）===

  // ListImages 列出 Worker 本机 Docker 镜像。
  rpc ListImages(ListImagesRequest) returns (ListImagesResponse);
  // PullImage 从 registry 拉取镜像到 Worker 本机（建实例选镜像前置）。
  rpc PullImage(PullImageRequest) returns (PullImageResponse);
  // RemoveImage 删除 Worker 本机 Docker 镜像。
  rpc RemoveImage(RemoveImageRequest) returns (RemoveImageResponse);

  // === 备份操作（FR-013 全量 / FR-056 增量 / FR-057 远程存储） ===

  // CreateBackup 将实例工作目录打包为 tar.gz 落到节点数据根 var/backups/。
  // 增量备份据 base_manifest 仅打包新增/变化文件；可选上传到远程存储后端。
  rpc CreateBackup(CreateBackupRequest) returns (CreateBackupResponse);
  // RestoreBackup 按备份链顺序（全量基 + 各增量）回放归档到实例工作目录；
  // 远程归档先据 storage 拉回本地再回放。
  rpc RestoreBackup(RestoreBackupRequest) returns (RestoreBackupResponse);

  // === Bot 操作 ===

  // CreateBot 在 Worker 上创建 Bot 连接。
  rpc CreateBot(CreateBotRequest) returns (CreateBotResponse);
  // DeleteBot 停止并删除 Bot。
  rpc DeleteBot(DeleteBotRequest) returns (DeleteBotResponse);
  // ListBots 列出 Worker 上所有 Bot。
  rpc ListBots(ListBotsRequest) returns (ListBotsResponse);
  // SetBotBehavior 切换 Bot 行为模式。
  rpc SetBotBehavior(SetBotBehaviorRequest) returns (SetBotBehaviorResponse);
  // SendBotCommand 向 Bot 发送命令。
  rpc SendBotCommand(SendBotCommandRequest) returns (SendBotCommandResponse);
  // RunBotScript 在指定 Bot 上执行脚本。
  rpc RunBotScript(RunBotScriptRequest) returns (RunBotScriptResponse);
  // StreamBotEvents 订阅 Bot 事件流。
  rpc StreamBotEvents(StreamBotEventsRequest) returns (stream BotEvent);

  // === 插件桥（ServerProbe 反向 WS ↔ Worker，FR-065，见 ADR-016）===
  //
  // 一次铺齐桥的全面：下游 FR-066（玩家事件）/FR-067（治理迁移+退 RCON）/FR-068（在线更新）
  // 复用以下 RPC 与 message，不再改 proto。地基（FR-065）仅真实使用 StreamPluginEvents
  // 的 connected/disconnected/heartbeat；其余事件子类型与命令/状态查询为骨架，语义留下游填充。

  // StreamPluginEvents 订阅某实例（或全部）探针经反向 WS 上报的事件流（connected/disconnected/玩家事件…）。
  rpc StreamPluginEvents(StreamPluginEventsRequest) returns (stream PluginEvent);
  // SendPluginCommand CP 经 Worker 向探针下发治理/查询指令（踢/封/白名单/在线列表…）。
  rpc SendPluginCommand(SendPluginCommandRequest) returns (SendPluginCommandResponse);
  // QueryServerState 查询子服全状态（在线列表/世界/TPS 等聚合），骨架，语义留下游。
  rpc QueryServerState(QueryServerStateRequest) returns (QueryServerStateResponse);

  // === 面板自更新（FR-081，见 ADR-020 §4）===

  // GetVersion 返回 Worker 当前版本与平台信息，供 CP 自更新检查比对。
  rpc GetVersion(GetVersionRequest) returns (GetVersionResponse);
  // UpgradeWorker 令 Worker 下载指定二进制 → sha256 校验 → 替换自身 → 计划重启。
  // daemon 模式下不杀游戏服（ADR-003 wrapper 子进程与 Worker 主进程隔离，
  // Worker 重启后 RecoverDaemonInstances 经 PID 文件重连存活 wrapper）。
  rpc UpgradeWorker(UpgradeWorkerRequest) returns (UpgradeWorkerResponse);
}

// === 注册 ===

message RegisterRequest {
  string name = 1;
  string host = 2;
  int32 grpc_port = 3;
  int32 ws_port = 4;
  string os = 5;
  string arch = 6;
  int32 cpu_cores = 7;
  int64 memory_mb = 8;
  int64 disk_total_mb = 9;
}

message RegisterResponse {
  string node_uuid = 1;
  string node_secret = 2;
}

// === 心跳 ===

message HeartbeatRequest {
  string node_uuid = 1;
  float cpu_usage = 2;
  float memory_usage = 3;
  float disk_usage = 4;
  int64 memory_used_mb = 5;
  int64 disk_used_mb = 6;
  repeated InstanceState instances = 7;  // 实例状态快照
  int64 network_bytes_sent = 8;  // 累计网络发送字节
  int64 network_bytes_recv = 9;  // 累计网络接收字节
  repeated InstanceMetricSample instance_metrics = 10;  // 每实例 ServerProbe 快照（FR-060 时序）
  double load_avg1 = 11;  // 节点 1 分钟 load average（FR-062；gopsutil 跨平台，取不到为 0）
}

message InstanceState {
  string instance_uuid = 1;
  string state = 2; // STOPPED, STARTING, RUNNING, STOPPING, CRASHED
}

// InstanceMetricSample 心跳负载里携带的每实例 ServerProbe 指标快照（FR-060 时序留存）。
// probe_available=false 表示探针不可用（回退 RCON 或缺测），相应字段为零值。
// 复用下方 WorldMetric 承载分世界负载。
message InstanceMetricSample {
  string instance_uuid = 1;
  bool probe_available = 2;
  double tps = 3;
  double mspt_millis = 4;
  int32 players_online = 5;
  int64 heap_used_bytes = 6;
  int64 heap_max_bytes = 7;
  int32 threads = 8;
  double cpu_load = 9;        // 0~1 系统 CPU；<0 不可用
  double uptime_seconds = 10;
  repeated WorldMetric worlds = 11;
}

message HeartbeatResponse {
  int64 timestamp = 1;
}

// === 实例操作 ===

message CreateInstanceRequest {
  string instance_uuid = 1;
  string name = 2;
  string type = 3;
  string process_type = 4;
  string start_command = 5;
  string work_dir = 6;
  map<string, string> env_vars = 7;
  bool auto_restart = 8;
  // 绑定到 Worker 本地 JDK 路径（CP 解析 NodeJDK.Path 后下发），非空时
  // Worker 启动实例时把它作为 JAVA_HOME 并把 bin 接入 PATH。
  string jdk_path = 9;
  // 显式指定 JDK bin 目录，覆盖默认的 jdk_path/bin。
  string jdk_bin_path = 10;
  // 优雅停止命令：daemon 模式优雅关服时写入进程 stdin 的命令（不含换行）。
  // CP 按实例角色派生（MC 后端 stop / 代理 end）；为空时 Worker 回退到 "stop"。
  string stop_command = 11;
  // probe_port 是 ServerProbe /metrics 端口（CP 分配后下发），Worker 持久化到 PID 记录，
  // 心跳时据此自采每实例 ServerProbe 快照（FR-060 时序）；0=未部署探针，心跳不采该实例。
  int32 probe_port = 12;
  // graceful_stop_timeout_seconds 是优雅停止后等待进程自行退出的上限（秒，CP 从平台设置
  // graceful_stop.timeout 取生效值后下发）。daemon 策略透传到 wrapper，停服按此值超时强杀。
  // 语义：对设置变更后「新启动」的实例生效（值在启动时定型）；0=未指定，wrapper 回退 env/默认。
  int32 graceful_stop_timeout_seconds = 13;
  // image 是 docker 模式的容器镜像引用（如 itzg/minecraft-server:latest）。
  // 仅 process_type=docker 使用；Worker 启动前若本地缺镜像则拉取（FR-078，见 ADR-019）。
  string image = 14;
  // port_mappings 是 docker 模式的容器端口↔宿主端口发布关系（宿主端口来自 FR-032 端口池）。
  // 仅 process_type=docker 使用。
  repeated PortMapping port_mappings = 15;
  // cpu_limit 是 docker 模式的 CPU 核数上限（如 1.5 表示 1.5 核），注入 HostConfig.NanoCPUs（×1e9）。
  // 仅 process_type=docker 使用；0=不限制（FR-079，见 ADR-019）。
  double cpu_limit = 16;
  // mem_limit_mb 是 docker 模式的内存上限（MiB），注入 HostConfig.Memory（×1024×1024）。
  // 仅 process_type=docker 使用；0=不限制（FR-079，见 ADR-019）。
  int64 mem_limit_mb = 17;
  // disk_limit_mb 是 docker 模式的磁盘上限（MiB），仅持久化与展示，v1 不注入。
  // bind-mount 工作目录无法用 HostConfig 简单施加磁盘配额（依赖存储驱动），留作前向兼容（FR-079）。
  int64 disk_limit_mb = 18;
}

// PortMapping 描述一条容器端口到宿主端口的发布关系（docker 模式，ADR-019）。
message PortMapping {
  int32 container_port = 1; // 容器内监听端口（由镜像约定，如 MC 容器内 25565）
  int32 host_port = 2;      // 宿主发布端口（来自 FR-032 端口池）
  string protocol = 3;      // tcp（默认）或 udp（如 MC query）
}

message CreateInstanceResponse {
  bool success = 1;
  string error = 2;
}

message InstanceActionRequest {
  string instance_uuid = 1;
}

message InstanceActionResponse {
  bool success = 1;
  string error = 2;
}

message SendCommandRequest {
  string instance_uuid = 1;
  string command = 2;
}

message SendCommandResponse {
  bool success = 1;
  string error = 2;
}

message GetInstanceStatusResponse {
  string instance_uuid = 1;
  string state = 2; // STOPPED, STARTING, RUNNING, STOPPING, CRASHED
}

message ListInstancesRequest {}

message ListInstancesResponse {
  repeated InstanceInfo instances = 1;
}

message InstanceInfo {
  string instance_uuid = 1;
  string name = 2;
  string state = 3;
  string type = 4;
  int64 started_at = 5;
  int32 pid = 6;
}

// === 实例事件流 ===

message StreamInstanceEventsRequest {
  string instance_uuid = 1; // 空表示所有实例
}

message InstanceEvent {
  string instance_uuid = 1;
  string type = 2; // stdout, stderr, state_change
  string data = 3;
  int64 timestamp = 4;
}

// === 终端 ===

message IssueTerminalTokenRequest {
  string instance_uuid = 1;
  string permission = 2; // read, write
}

message IssueTerminalTokenResponse {
  string token = 1;
  string ws_url = 2;
  int32 expires_in = 3;
}

// === 文件操作 ===

message ListFilesRequest {
  string instance_uuid = 1;
  string path = 2;
}

message ListFilesResponse {
  repeated FileInfo files = 1;
}

message FileInfo {
  string name = 1;
  bool is_dir = 2;
  int64 size = 3;
  int64 mod_time = 4;
}

message ReadFileRequest {
  string instance_uuid = 1;
  string path = 2;
}

message ReadFileResponse {
  bytes content = 1;
}

message WriteFileRequest {
  string instance_uuid = 1;
  string path = 2;
  bytes content = 3;
}

message WriteFileResponse {
  bool success = 1;
  string error = 2;
}

message DeleteFileRequest {
  string instance_uuid = 1;
  string path = 2;
}

message DeleteFileResponse {
  bool success = 1;
  string error = 2;
}

message RenameFileRequest {
  string instance_uuid = 1;
  string old_path = 2;
  string new_path = 3;
}

message RenameFileResponse {
  bool success = 1;
  string error = 2;
}

message DownloadArchiveRequest {
  string instance_uuid = 1;
  repeated string paths = 2; // 相对工作目录的文件/目录集合，目录递归打包
}

message DownloadArchiveChunk {
  bytes content = 1; // zip 字节分片
}

// === 全文搜索 / 文件名快速打开（FR-074，见 ADR-017）===

message SearchFilesRequest {
  string instance_uuid = 1;
  string query = 2;        // 关键字（content 模式按词项/子串、filename 模式按路径/basename 子串）
  string mode = 3;         // content（全文，默认）| filename（文件名快速打开）
  int32 max_results = 4;   // 命中上限（<=0 时 Worker 取默认 200）
}

// SearchHit 单条命中：content 模式含行号与该行片段；filename 模式 line=0、snippet 为空。
message SearchHit {
  string path = 1;   // 相对实例工作目录、以「/」分隔的可移植路径
  int32 line = 2;    // 命中行号（1 起；filename 模式为 0）
  string snippet = 3; // 命中行内容（已截断，仅 content 模式）
}

message SearchFilesResponse {
  repeated SearchHit hits = 1;
  bool truncated = 2;  // 命中数达到 max_results 上限被截断
  bool indexing = 3;   // 索引首建未就绪：本次返回空命中，调用方应稍后用同一查询重试（FR-113，ADR-024）
}

// === 配置文件操作 ===

message ListConfigFilesRequest {
  string instance_uuid = 1;
  string path = 2;
}

message ConfigFileInfo {
  string path = 1;
  string format = 2;
  int64 size = 3;
  int64 updated_at = 4;
  bool supported = 5;
}

message ListConfigFilesResponse {
  repeated ConfigFileInfo files = 1;
}

message ConfigField {
  string key = 1;
  string value = 2;
  string type = 3;
  string description = 4;
  int32 line = 5;
}

message ValidationIssue {
  string level = 1;
  string message = 2;
  string path = 3;
  int32 line = 4;
  string key = 5;
}

message ConfigValidationResult {
  bool valid = 1;
  repeated ValidationIssue issues = 2;
}

message ReadConfigRequest {
  string instance_uuid = 1;
  string path = 2;
}

message ReadConfigResponse {
  string path = 1;
  string format = 2;
  string content = 3;
  repeated ConfigField fields = 4;
  string schema_json = 5;
  ConfigValidationResult validation = 6;
  string model = 7;
}

message WriteConfigRequest {
  string instance_uuid = 1;
  string path = 2;
  string content = 3;
  repeated ConfigField fields = 4;
}

message WriteConfigResponse {
  bool success = 1;
  string error = 2;
  ConfigValidationResult validation = 3;
  uint32 version_id = 4;
}

message ValidateConfigRequest {
  string instance_uuid = 1;
  string path = 2;
  string content = 3;
}

message ValidateConfigResponse {
  ConfigValidationResult validation = 1;
}

message DiffConfigRequest {
  string instance_uuid = 1;
  string path = 2;
  uint32 from_version_id = 3;
  uint32 to_version_id = 4;
}

message DiffConfigResponse {
  uint32 from_version_id = 1;
  uint32 to_version_id = 2;
  string unified_diff = 3;
  string from_content = 4;
  string to_content = 5;
}

// === 指标 ===

message GetNodeMetricsRequest {}

message GetNodeMetricsResponse {
  float cpu_usage = 1;
  float memory_usage = 2;
  float disk_usage = 3;
  int64 memory_used_mb = 4;
  int64 memory_total_mb = 5;
  int64 disk_used_mb = 6;
  int64 disk_total_mb = 7;
}

message GetInstanceMetricsRequest {
  string instance_uuid = 1;
  // probe_port 是 ServerProbe /metrics 端口（0=未部署探针，指标返回 N/A）。
  // RCON 回退已退役（FR-067，见 ADR-016）：指标纯探针，未部署探针即 N/A。
  int32 probe_port = 2;
}

message GetInstanceMetricsResponse {
  float tps = 1;
  int32 online_players = 2;
  int64 memory_mb = 3;
  // 以下为 ServerProbe 富指标（FR-010）；探针不可用时为零值，probe_available=false。
  float mspt_millis = 4;
  int32 threads = 5;
  double cpu_percent = 6;
  int64 heap_max_mb = 7;
  double uptime_seconds = 8;
  repeated WorldMetric worlds = 9;
  // probe_available=true 表示指标来自 ServerProbe；false 表示探针未部署/未就绪（指标 N/A）。
  // RCON 回退已退役（FR-067，见 ADR-016）：不再有 RCON/进程内存兜底的 TPS/在线人数。
  bool probe_available = 10;
}

// WorldMetric 单个世界的负载（来自 ServerProbe serverprobe_world_*）。
message WorldMetric {
  string name = 1;
  int64 loaded_chunks = 2;
  int64 entities = 3;
  int64 tile_entities = 4;
}

// === Bot 操作 ===

message CreateBotRequest {
  string bot_uuid = 1;
  string instance_uuid = 2;
  string name = 3;
  string host = 4;
  int32 port = 5;
  string username = 6;
  string version = 7;
  string auth = 8;           // offline, microsoft
  string behavior = 9;       // idle, follow, patrol, guard, custom
  string behavior_config = 10; // JSON: custom 行为配置
}

message CreateBotResponse {
  bool success = 1;
  string error = 2;
  string status = 3;  // connecting, connected, error
}

message DeleteBotRequest {
  string bot_uuid = 1;
}

message DeleteBotResponse {
  bool success = 1;
  string error = 2;
}

message ListBotsRequest {
  string instance_uuid = 1; // 空表示所有
}

message ListBotsResponse {
  repeated BotInfo bots = 1;
}

message BotInfo {
  string bot_uuid = 1;
  string instance_uuid = 2;
  string name = 3;
  string status = 4;     // connecting, connected, disconnected, error
  string behavior = 5;
  float health = 6;
  int32 food = 7;
  float pos_x = 8;
  float pos_y = 9;
  float pos_z = 10;
}

message SetBotBehaviorRequest {
  string bot_uuid = 1;
  string behavior = 2;
  string target = 3;       // follow 目标玩家名
  string behavior_config = 4; // JSON: custom 行为配置
}

message SetBotBehaviorResponse {
  bool success = 1;
  string error = 2;
}

message SendBotCommandRequest {
  string bot_uuid = 1;
  string command = 2;
}

message SendBotCommandResponse {
  bool success = 1;
  string error = 2;
}

message RunBotScriptRequest {
  string script_id = 1;
  string steps_json = 2; // JSON: 脚本步骤列表
  repeated string bot_uuids = 3;
}

message RunBotScriptResponse {
  bool success = 1;
  string error = 2;
}

message StreamBotEventsRequest {
  string bot_uuid = 1; // 空表示所有
}

message BotEvent {
  string bot_uuid = 1;
  string type = 2;    // spawn, kicked, behavior-changed, command-sent, script-progress, state
  string data = 3;    // JSON
  int64 timestamp = 4;
}
// === JDK 管理 ===

message ListJDKsRequest {}

message JDKInfo {
  string vendor = 1;
  int32 major_version = 2;
  string version = 3;
  string arch = 4;
  string path = 5;
  bool managed = 6;
}

message ListJDKsResponse {
  repeated JDKInfo jdks = 1;
}

message InstallJDKRequest {
  string vendor = 1;       // Temurin / Zulu / Corretto / ...
  int32 major_version = 2; // 8 / 11 / 17 / 21 / ...
  string arch = 3;         // x64 / aarch64
  string install_dir = 4;   // 可选：自定义安装目录（默认 <serversDir>/jdks/<vendor>-<major>）
  // mirror_base 是该 vendor 的下载基址（CP 从平台设置 jdk.mirror.<vendor> 取生效值后下发）。
  // 非空时 Worker 用它构造下载 URL，使运行时配置的镜像源真生效；为空时回退 Worker 本地 env/默认源。
  string mirror_base = 5;
}

message InstallJDKResponse {
  bool success = 1;
  string error = 2;
  JDKInfo jdk = 3;
}

message RemoveJDKRequest {
  string path = 1;
}

message RemoveJDKResponse {
  bool success = 1;
  string error = 2;
}

// === 子服搭建（FR-034） ===

message DownloadCoreRequest {
  string instance_uuid = 1;
  string dest_filename = 2; // 落地文件名（如 server.jar），相对实例工作目录
  string download_url = 3;
  string sha256 = 4;        // 可选；非空时校验下载内容
}

message DownloadCoreResponse {
  bool success = 1;
  string error = 2;
  int64 size = 3;
}

message DeployServerProbeRequest {
  string instance_uuid = 1;
  // jar 探针插件 jar 字节（CP 由 go:embed 取出后下发；为空表示未捆绑探针，跳过 jar 写入）。
  bytes jar = 2;
  // config_yaml 生成的 plugins/ServerProbe/config.yml 内容（已按分配端口开启 /metrics）。
  string config_yaml = 3;
}

message DeployServerProbeResponse {
  bool success = 1;
  string error = 2;
}

// === 一键复制子服（FR-036） ===

message CloneWorkDirRequest {
  string src_instance_uuid = 1; // 源实例（须已注册，提供其工作目录）
  string dst_instance_uuid = 2; // 目标实例（须已注册，提供其工作目录）
  repeated string exclude = 3;  // 相对源工作目录的排除项：目录前缀、精确路径或 basename glob（如 *.pid）
}

message CloneWorkDirResponse {
  bool success = 1;
  string error = 2;
  int64 copied_files = 3;
  int64 copied_bytes = 4;
  repeated string skipped = 5; // 被排除跳过的顶层项/目录（回报用）
}

// === Docker 镜像管理（FR-078，见 ADR-019） ===

message ListImagesRequest {}

// ImageInfo 描述 Worker 本机一个 Docker 镜像。
message ImageInfo {
  string id = 1;             // 镜像 ID（sha256:...）
  repeated string tags = 2;  // RepoTags（如 itzg/minecraft-server:latest）
  int64 size_bytes = 3;      // 镜像占用字节
  int64 created = 4;         // 创建时间（Unix 秒）
}

message ListImagesResponse {
  repeated ImageInfo images = 1;
  // docker_available 为 false 表示本机未安装/未运行 Docker 守护进程。
  bool docker_available = 2;
  string error = 3;
}

message PullImageRequest {
  string image = 1; // 镜像引用（含 tag），默认 Docker Hub
}

message PullImageResponse {
  bool success = 1;
  string error = 2;
}

message RemoveImageRequest {
  string image = 1; // 镜像引用或 ID
  bool force = 2;    // 强制删除（即使有停止的容器引用）
}

message RemoveImageResponse {
  bool success = 1;
  string error = 2;
}

// === 备份操作（FR-013/FR-056/FR-057） ===

// StorageBackendSpec 远程存储后端的传输参数。
// 凭证由 Control Plane 侧从 ${ENV_VAR} 解析后填入（CP 拥有配置/DB），
// Worker 视其为不透明传输参数，仅按 type 执行上传/下载。参见 config-files.md。
message StorageBackendSpec {
  string type = 1;        // local | s3 | sftp | webdav
  string endpoint = 2;    // S3 endpoint / WebDAV base URL / SFTP host:port
  string bucket = 3;      // S3 bucket（其余后端忽略）
  string region = 4;      // S3 region
  string prefix = 5;      // 对象键/远程目录前缀
  string access_key = 6;  // 已解析凭证：S3 access key / SFTP 用户名 / WebDAV 用户名
  string secret_key = 7;  // 已解析凭证：S3 secret key / SFTP 密码 / WebDAV 密码
  bool use_ssl = 8;       // S3 是否启用 TLS
}

// BackupManifestEntry 备份清单中的单个文件指纹，用于增量差异比对。
message BackupManifestEntry {
  string path = 1;     // 相对实例工作目录、以「/」分隔的可移植路径
  int64 size = 2;      // 字节数
  int64 mod_time = 3;  // 修改时间 Unix 秒
}

message CreateBackupRequest {
  string instance_uuid = 1;          // 目标实例（据其工作目录打包）
  string backup_uuid = 2;            // 备份 UUID，决定归档文件名
  bool incremental = 3;              // 是否增量
  repeated BackupManifestEntry base_manifest = 4; // 增量基准清单（链上各前序备份合并后的文件指纹）
  StorageBackendSpec storage = 5;    // 非空且 type!=local 时，打包后上传到该远程后端
}

message CreateBackupResponse {
  bool success = 1;
  string error = 2;
  string rel_path = 3;               // 归档相对节点数据根的路径（var/backups/<instanceID>/<uuid>.tar.gz）
  int64 size_bytes = 4;              // 归档字节数
  int64 file_count = 5;              // 本次实际打包文件数（增量为变化文件数）
  repeated BackupManifestEntry manifest = 6; // 本次备份后实例工作目录的完整清单（供下次增量比对与链回放）
  string storage_key = 7;            // 上传到远程后的对象键（本地备份为空）
}

message RestoreBackupRequest {
  string instance_uuid = 1;          // 目标实例（恢复到其工作目录）
  repeated string rel_paths = 2;     // 备份链归档相对路径，按顺序回放（全量基在前，增量依次在后）
  StorageBackendSpec storage = 3;    // 非空且 type!=local 时，归档先从远程拉回本地再回放
  repeated string storage_keys = 4;  // 与 rel_paths 对应的远程对象键（远程恢复用）
}

message RestoreBackupResponse {
  bool success = 1;
  string error = 2;
  int64 restored_files = 3;          // 回放写入的文件数
}

// === 插件桥（ServerProbe 反向 WS ↔ Worker，FR-065，见 ADR-016）===
//
// 一次铺齐桥全面：事件（PluginEvent）/命令（PluginCommand）/状态查询（QueryServerState*）。
// 地基（FR-065）仅真实使用 PluginEvent 的 connected/disconnected/heartbeat；其余字段为骨架，
// 语义由 FR-066/067/068 填充。

message StreamPluginEventsRequest {
  string instance_uuid = 1; // 空表示订阅所有实例
}

// PluginEvent 探针经反向 WS 上报、由 Worker 经本流冒泡给 CP 的事件。
// type 取值：connected | disconnected | heartbeat | player_join | player_quit
//          | chat | cross_server | command_result | state
message PluginEvent {
  string instance_uuid = 1;
  string type = 2;
  int64 timestamp = 3;
  string player_name = 4;   // 玩家事件：玩家名
  string player_uuid = 5;   // 玩家事件：玩家 UUID
  string message = 6;       // chat 内容 / 事件描述
  string server = 7;        // 子服名（玩家所在/事件发生）
  string from_server = 8;   // cross_server：来源子服
  string to_server = 9;     // cross_server：目标子服
  string platform = 10;     // bukkit | bungee（来自探针 hello）
  string version = 11;      // 探针版本
  string request_id = 12;   // command_result 对应的请求标识
  string raw_json = 13;     // 透传原始载荷（下游按需解析）
  // domain 业务域命名空间（JBIS，FR-115/ADR-027）：空/core=监控/治理既有事件；
  // economy/inventory… 为业务域事件，CP 据此分流落业务汇聚而非监控。
  string domain = 14;
  // dedup_key 业务事件去重键（JBIS）：CP 按 (domain,dedup_key) 幂等落库（至少一次投递去重）；
  // 监控事件此字段空。
  string dedup_key = 15;
}

// PluginCommand CP 下发给探针的治理/查询指令。
// action 取值：kick | ban | unban | whitelist_add | whitelist_remove | list | query_state
message PluginCommand {
  string action = 1;
  string target = 2;        // 目标玩家名/UUID
  string reason = 3;        // 踢/封原因
  repeated string args = 4; // 透传额外参数
  string request_id = 5;    // 关联 command_result 回执
  // domain 业务域命名空间（JBIS，FR-115/ADR-027）：空/core=内建治理（既有 kick/ban…）；
  // economy/inventory… 为业务域，Worker 按 domain 前缀路由到对应桥业务会话。
  string domain = 6;
  // payload_json 结构化业务参数（JBIS）：业务动作的入参以 JSON 承载（如 economy.balance 的 player/currency），
  // 与 args（治理用 repeated string）并存；治理命令此字段空。
  string payload_json = 7;
}

message SendPluginCommandRequest {
  string instance_uuid = 1;
  PluginCommand command = 2;
  // wait=true 时 Worker 同步等待探针的 command_result 回执（FR-067 治理：踢/封/解封/白名单/在线列表）。
  // wait=false 为即发即忘（仅校验已下发，不等结果）。
  bool wait = 3;
}

message SendPluginCommandResponse {
  bool success = 1;
  string error = 2;
  string request_id = 3;
  // output 是探针执行指令的输出（list/whitelist 等查询结果；wait=true 且执行成功时填充，FR-067）。
  string output = 4;
}

message QueryServerStateRequest {
  string instance_uuid = 1;
}

message QueryServerStateResponse {
  bool success = 1;
  string error = 2;
  bool connected = 3;       // 探针当前是否在线
  string state_json = 4;    // 聚合状态 JSON（下游填充）
}

// === 面板自更新（FR-081，见 ADR-020 §4） ===

message GetVersionRequest {}

message GetVersionResponse {
  string version = 1; // Worker 当前版本（internal/version.Version）
  string os = 2;      // runtime.GOOS（linux/windows/darwin）
  string arch = 3;    // runtime.GOARCH（amd64/arm64）
}

message UpgradeWorkerRequest {
  string download_url = 1;   // 目标 Worker 二进制下载地址（CP 据 feed + 节点平台解析后下发）
  string sha256 = 2;         // 期望 sha256（Worker 下载后校验，不符拒绝替换）
  string target_version = 3; // 目标版本号（仅记录/回报）
  bool allow_insecure = 4;   // 是否允许 http 下载源（默认仅 https；本地/内网自测可开）
}

message UpgradeWorkerResponse {
  bool success = 1;        // 替换成功、重启已计划
  string error = 2;        // 失败原因（下载失败/校验不符/替换失败）
  string from_version = 3; // 升级前版本
}

// === 归档浏览与反编译（FR-075，见 ADR-018） ===

message ListArchiveEntriesRequest {
  string instance_uuid = 1;
  string path = 2;          // 相对工作目录的归档文件路径（.jar/.zip）
}

// ArchiveEntry 归档（zip/jar）内的单个条目（扁平，前端按「/」重建子树）。
message ArchiveEntry {
  string name = 1;            // 归档内条目名（「/」分隔；目录条目以「/」结尾）
  bool is_dir = 2;
  int64 size = 3;            // 解压后字节
  int64 compressed_size = 4;
  int64 modified = 5;       // Unix 秒
  uint32 crc32 = 6;
}

message ListArchiveEntriesResponse {
  repeated ArchiveEntry entries = 1;
  bool truncated = 2;       // 条目数超上限被截断
}

message ReadArchiveEntryRequest {
  string instance_uuid = 1;
  string path = 2;          // 归档文件路径
  string entry = 3;         // 归档内条目名
}

message ReadArchiveEntryResponse {
  bytes content = 1;        // 内容（截断到上限）
  bool truncated = 2;
  bool binary = 3;          // 嗅探为二进制（前端不文本预览）
}

message DecompileClassRequest {
  string instance_uuid = 1;
  string path = 2;          // 工作目录内 .class 或 .jar 路径
  string entry = 3;         // 可选：path 为 .jar 时反编译 jar 内某 .class 条目；空=反编译整个 jar
}

message DecompileClassResponse {
  bool success = 1;
  string error = 2;         // 失败/降级原因（无 JDK / 无 CFR / 超时 / 超限 / CFR 非 0 退出）
  string source = 3;        // 反编译 Java 源码（截断到上限）
  bool truncated = 4;
  string decompiler = 5;    // 反编译器标识（如 "CFR 0.152"）
}

