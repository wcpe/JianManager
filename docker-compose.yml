version: "3.8"

services:
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.control-plane
    ports:
      - "8080:8080"   # HTTP API + 前端
      - "9100:9100"   # gRPC
    environment:
      - JIANMANAGER_SERVER_PORT=8080
      - JIANMANAGER_GRPC_PORT=9100
      - JIANMANAGER_DB_DRIVER=sqlite
      - JIANMANAGER_DB_DSN=/app/data/jianmanager.db
      - JIANMANAGER_JWT_SECRET=${JIANMANAGER_JWT_SECRET:-dev-secret-change-me}
      - JIANMANAGER_ADMIN_USERNAME=${JIANMANAGER_ADMIN_USERNAME:-admin}
      - JIANMANAGER_ADMIN_PASSWORD=${JIANMANAGER_ADMIN_PASSWORD:-admin123}
    volumes:
      - cp-data:/app/data

  worker-01:
    build:
      context: .
      dockerfile: Dockerfile.worker
    ports:
      - "9101:9101"   # gRPC
      - "9102:9102"   # WS
    environment:
      - JIANMANAGER_NODE_NAME=node-01
      - JIANMANAGER_CONTROL_PLANE=control-plane:9100
      - JIANMANAGER_GRPC_PORT=9101
      - JIANMANAGER_WS_PORT=9102
      - JIANMANAGER_NODE_SECRET=${JIANMANAGER_NODE_SECRET:-}
    volumes:
      - worker-01-servers:/app/servers
    depends_on:
      - control-plane

volumes:
  cp-data:
  worker-01-servers:
