# JianManager — worker 配置样例
# 配置由 Worker 启动时真正加载（FR-080，见 ADR-020）；JIANMANAGER_ 前缀环境变量按路径覆盖。
name: node-01
control_plane: localhost:9100
node_secret: ${JIANMANAGER_NODE_SECRET}

# 注册上报给 CP 的本机地址（供 CP 反向连接）；留空自动探测出口 IP。
# host: ""

# WS 终端 / 插件桥一次性 token 校验密钥；与 Control Plane 共享（生产经 JIANMANAGER_JWT_SECRET 覆盖）。
jwt_secret: dev-secret-change-me

# enrollment token（一次性节点准入凭据）绝不写入本文件——经 JIANMANAGER_ENROLL_TOKEN
# 或安装脚本命令行一次性传入；注册成功后 CP 换发的身份持久化到 <data_dir>/etc/node-identity.json。

grpc:
  port: 9101

ws:
  port: 9102

# 项目自包含数据根（FHS 式布局，见 ADR-010）。默认 ./data，可经 JIANMANAGER_DATA_DIR 覆盖。
# JDK 装入 <data_dir>/opt/jdks，服务器工作目录在 <data_dir>/var/servers，整体可迁移。
data_dir: ./data

# 兼容旧部署：显式指定时覆盖数据根派生的 var/servers；留空则用 <data_dir>/var/servers。
# servers_dir: ./servers

# 节点本地制品缓存（FR-178）：按 sha256 缓存下载过的服务端核心 jar（<data_dir>/var/artifact-cache），
# 建实例命中即秒拷免重下。max_bytes=0 不限；设上限后存入超限按 lastUsedAt 升序 LRU 淘汰。
# 也可经 CP 端点 PUT /nodes/:id/artifact-cache/cap 运行时下发覆盖。
# artifact_cache:
#   max_bytes: 0                    # 例：10737418240（10 GiB）

log:
  level: info
  format: text

# 出站网络代理（FR-174，见 ADR-037；可视化配置 + CP 下发见 FR-185 / ADR-043）。本节点所有出站
# 下载（自更新二进制、JDK 归档、CFR 反编译器、服务端 jar）经此代理。url 留空=直连（仍尊重
# HTTP_PROXY/HTTPS_PROXY/NO_PROXY 环境变量），不破坏现状；非空时优先于环境变量。
# scheme 决定类型：http:// / https:// / socks5://。含凭据时经 ${ENV} 注入、勿硬编码。
# 也可在面板「节点页 → 代理」为本节点配「继承全局 / 自定义」，经心跳下发、运行时生效（无需改本文件/重启）；
# 节点出站优先级：节点自定义（DB 下发） > 全局默认（DB 下发） > worker.yaml > 环境变量。
# proxy:
#   url: ""                       # 例：http://127.0.0.1:7890 或 socks5://user:${PROXY_PASS}@127.0.0.1:1080
#   no_proxy: ""                  # 逗号分隔免代理：localhost,127.0.0.1,10.0.0.0/8,.internal.example
