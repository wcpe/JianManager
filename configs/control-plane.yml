# JianManager — control-plane 配置样例
server:
  host: 0.0.0.0
  port: 8080
  dev_mode: true

grpc:
  port: 9100

database:
  driver: sqlite
  dsn: data/jianmanager.db

jwt:
  secret: dev-secret-change-me  # 生产环境通过 JIANMANAGER_JWT_SECRET 环境变量覆盖
  access_ttl: 15m
  refresh_ttl: 168h

log:
  level: info
  format: text

# 日志中心：持久化、归档与保留（FR-049）。均有默认值，可整体省略。
log_store:
  enabled: true                 # 是否启用日志入库与归档
  persist_platform: true        # 平台结构化日志是否一并落库
  retention_days: 14            # 保留天数，<=0 不按时间清理
  max_total_mb: 512             # 表内日志总量上限(MB)，<=0 不按总量清理
  archive_interval_minutes: 30  # 后台归档/保留巡检周期（分钟）

# 通用文件改前快照与版本回滚（FR-051）
file_version:
  max_per_file: 20        # 单文件保留版本上限，超出删最旧；<=0 不限制
  max_size_bytes: 5242880 # 触发快照的单文件大小上限（5MiB），超过则跳过；<=0 不限制

# 节点 enrollment 一键安装 / 傻瓜部署（FR-080，见 ADR-020）。均有默认值，可整体省略。
# 用于拼装面板「添加节点」展示的一键安装命令；留空字段由签发请求的 Host 推断。
enroll:
  advertise_grpc: ""    # 对外公布的 CP gRPC 地址 host:port（留空=请求 Host + grpc.port）
  script_base_url: ""   # 安装脚本下载基址 scheme://host（留空=请求 scheme://Host）
  binary_url: ""        # Worker 二进制下载地址（留空=脚本经 --binary 指向本地二进制兜底）

# 面板自更新：CP/Worker 二进制在线升级（FR-081 / FR-175 / FR-182，见 ADR-036 §7、ADR-039）。
# 均有默认值，可整体省略。默认读 GitHub Releases 源（github_repo=wcpe/JianManager + channel=stable），开箱即可在线升级。
# github_repo 与 feed_url 均留空才视为「未配置更新源」，检查更新返回 configured=false、不执行升级。
# 升级前会自动备份当前二进制供一键回滚（FR-182），无需额外配置。
update:
  github_repo: "wcpe/JianManager"  # GitHub Releases 源 owner/repo；非空即启用（权威来源）。留空回退 feed_url
  channel: "stable"                # stable=取最新正式 release（/releases/latest）；prerelease=取滚动 latest 预发布（FR-182）
  github_token: ""                 # 可选 GitHub API token，提升限流额度（匿名 60 次/时够手动用）；经 ${ENV} 注入勿硬编码
  feed_url: ""                     # 可选回退：release feed JSON 地址（github_repo 空且此项非空时走原 feed 路径）
  binary_base_url: ""              # 私有二进制基址（可选兜底）：无 feed 时按 <base>/<component>-<os>-<arch> 拼下载地址
  allow_insecure: false            # 是否允许 http 下载源（默认仅 https 防中间人篡改；本地/内网自测可开）

# 客户端分发（OTA）manifest 签名（FR-087，见 ADR-022）。信任根 = manifest 的 Ed25519 签名，
# 客户端内置公钥验签；私钥服务端持有、不入库。
# - 本文件 dev_mode: true → sign_priv_key 留空时零配置回退内置开发密钥（公钥已回填客户端），仅供开发。
# - 生产（dev_mode: false）→ 未注入私钥即降级（视为未启用客户端 OTA，签名不可用、CP 照常启动，见 ADR-038）；
#   误注入源码公开的内置开发密钥则 fail-closed 拒绝启动。要启用 OTA 经环境变量
#   JIANMANAGER_CLIENT_SIGN_PRIVKEY 注入独立私钥（绝不用源码公开的开发密钥对外签名）。
client_dist:
  sign_priv_key: ""  # base64(PKCS#8 DER, Ed25519)；生产经 ${JIANMANAGER_CLIENT_SIGN_PRIVKEY} 注入，勿硬编码
  sign_key_id: k1    # 签名公钥版本标识（轮换用），须与客户端内置公钥 keyId 一致
  # 拉取密钥可逆加密密钥（FR-192，见 ADR-044）：另存明文 AES-256-GCM 加密副本供管理员查看明文，鉴权仍只用哈希。
  # 留空时优雅降级——dev_mode: true 回退内置 dev 密钥（仅开发）；生产留空则新建/轮换的密钥不可查看（不阻断建密钥）。
  # 生产经 ${JIANMANAGER_CLIENT_KEY_ENC_SECRET} 注入 32 字节 base64 密钥，勿硬编码。生成示例：openssl rand -base64 32
  key_enc_secret: ""  # base64(32 字节)；生产经 ${JIANMANAGER_CLIENT_KEY_ENC_SECRET} 注入

# 出站网络代理（FR-174，见 ADR-037；可视化配置 + 节点下发见 FR-185 / ADR-043）。CP 所有出站下载
#（自更新 feed/二进制、服务端 jar、客户端制品入库等）经此代理。url 留空=直连（仍尊重
# HTTP_PROXY/HTTPS_PROXY/NO_PROXY 环境变量），不破坏现状；非空时优先于环境变量。
# scheme 决定类型：http:// / https:// / socks5://。含凭据时经 ${ENV} 注入、勿硬编码。
# 也可在「设置 → 网络」面板配全局代理（保存即运行时生效、无需重启），其优先级高于本 yaml：
# settings DB 覆盖 > control-plane.yml > 环境变量。面板全局值同时作为各节点默认代理（节点页可覆盖）。
# proxy:
#   url: ""                       # 例：http://127.0.0.1:7890 或 socks5://user:${PROXY_PASS}@127.0.0.1:1080
#   no_proxy: ""                  # 逗号分隔免代理：localhost,127.0.0.1,10.0.0.0/8,.internal.example
