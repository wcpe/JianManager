# JianManager — control-plane 配置样例
server:
  host: 0.0.0.0
  port: 8080
  dev_mode: true

grpc:
  port: 9100

database:
  driver: sqlite
  dsn: data/jianmanager.db

jwt:
  secret: dev-secret-change-me  # 生产环境通过 JIANMANAGER_JWT_SECRET 环境变量覆盖
  access_ttl: 15m
  refresh_ttl: 168h

log:
  level: debug
  format: text

# 日志中心：持久化、归档与保留（FR-049）。均有默认值，可整体省略。
log_store:
  enabled: true                 # 是否启用日志入库与归档
  persist_platform: true        # 平台结构化日志是否一并落库
  retention_days: 14            # 保留天数，<=0 不按时间清理
  max_total_mb: 512             # 表内日志总量上限(MB)，<=0 不按总量清理
  archive_interval_minutes: 30  # 后台归档/保留巡检周期（分钟）

# 通用文件改前快照与版本回滚（FR-051）
file_version:
  max_per_file: 20        # 单文件保留版本上限，超出删最旧；<=0 不限制
  max_size_bytes: 5242880 # 触发快照的单文件大小上限（5MiB），超过则跳过；<=0 不限制
