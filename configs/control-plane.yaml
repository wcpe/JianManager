# JianManager — control-plane 配置样例
server:
  host: 0.0.0.0
  port: 8080
  dev_mode: true

grpc:
  port: 9100

database:
  driver: sqlite
  dsn: data/jianmanager.db

jwt:
  secret: ${JIANMANAGER_JWT_SECRET}
  access_ttl: 15m
  refresh_ttl: 168h

log:
  level: debug
  format: text

bootstrap:
  admin_username: admin
  admin_password: ${JIANMANAGER_ADMIN_PASSWORD}
