# JianManager — control-plane 配置样例
server:
  host: 0.0.0.0
  port: 8080
  dev_mode: true

grpc:
  port: 9100

database:
  driver: sqlite
  dsn: data/jianmanager.db

jwt:
  secret: dev-secret-change-me  # 生产环境通过 JIANMANAGER_JWT_SECRET 环境变量覆盖
  access_ttl: 15m
  refresh_ttl: 168h

log:
  level: debug
  format: text

bootstrap:
  admin_username: admin
  # admin_password 默认 admin123；生产环境通过 JIANMANAGER_BOOTSTRAP_ADMIN_PASSWORD 环境变量覆盖
